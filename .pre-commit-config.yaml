repos:
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.13
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.13"]

  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript type check
        entry: pnpm typecheck
        language: system
        pass_filenames: false
        types_or: [ts, tsx]

      - id: test
        name: Run tests
        entry: pnpm test
        language: system
        pass_filenames: false
        stages: [pre-commit]
